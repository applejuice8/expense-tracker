<h1>Edit Expense</h1>

<form action="{% url 'expenses:edit' expense.id %}" method="POST">
    {% csrf_token %}

    <label for="title">Title:</label><br>
    <input type="text" name="title" value="{{ expense.title }}" required><br><br>

    <label for="description">Description:</label><br>
    <textarea name="description" rows="3" cols="30">{{ expense.description }}</textarea><br><br>

    <label for="amount">Amount:</label><br>
    <input type="number" name="amount" step="0.01" value="{{ expense.amount }}" required><br><br>

    <label for="category">Category:</label><br>
    <input type="text" name="category" value="{{ expense.category }}"><br><br>

    <button type="submit">Update Expense</button>
</form>

<p>
    <a href="{% url 'expenses' %}">Return</a>
</p>
